<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <linearGradient id="skin5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d0a0"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg5)"/>
  <!-- Shoulders -->
  <ellipse cx="100" cy="210" rx="70" ry="50" fill="#1a3a4a" opacity="0.9"/>
  <!-- Neck -->
  <rect x="85" y="130" width="30" height="25" rx="6" fill="url(#skin5)"/>
  <!-- Head -->
  <ellipse cx="100" cy="95" rx="38" ry="44" fill="url(#skin5)"/>
  <!-- Hair - straight dark, swept to side -->
  <path d="M62 82 Q62 48 100 42 Q138 48 138 82 L138 65 Q135 38 100 32 Q65 38 62 65 Z" fill="#1a1a2e"/>
  <path d="M62 75 Q58 65 65 55 Q70 48 80 50 L62 82 Z" fill="#1a1a2e"/>
  <!-- Eyes -->
  <ellipse cx="82" cy="95" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="118" cy="95" rx="5" ry="5.5" fill="#1a1a2e"/>
  <circle cx="83.5" cy="93.5" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="119.5" cy="93.5" r="1.5" fill="white" opacity="0.8"/>
  <!-- Eyebrows -->
  <path d="M73 84 Q82 80 92 83" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108 83 Q118 80 127 84" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M97 100 Q100 110 103 100" stroke="#c49a6c" stroke-width="1.5" fill="none"/>
  <!-- Mouth - slight smile -->
  <path d="M90 116 Q100 121 110 116" stroke="#b06050" stroke-width="2" fill="none" stroke-linecap="round"/>
