<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
    <linearGradient id="skin7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c8a0"/>
      <stop offset="100%" stop-color="#c9a07a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg7)"/>
  <!-- Shoulders -->
  <ellipse cx="100" cy="210" rx="70" ry="50" fill="#3b2060" opacity="0.9"/>
  <!-- Neck -->
  <rect x="87" y="130" width="26" height="25" rx="6" fill="url(#skin7)"/>
  <!-- Head -->
  <ellipse cx="100" cy="95" rx="37" ry="43" fill="url(#skin7)"/>
  <!-- Hair - curly volume -->
  <ellipse cx="100" cy="70" rx="48" ry="38" fill="#2c1810"/>
  <circle cx="58" cy="75" r="14" fill="#2c1810"/>
  <circle cx="142" cy="75" r="14" fill="#2c1810"/>
  <circle cx="55" cy="95" r="12" fill="#2c1810"/>
  <circle cx="145" cy="95" r="12" fill="#2c1810"/>
  <circle cx="60" cy="110" r="10" fill="#2c1810"/>
  <circle cx="140" cy="110" r="10" fill="#2c1810"/>
  <circle cx="68" cy="55" r="10" fill="#2c1810"/>
  <circle cx="132" cy="55" r="10" fill="#2c1810"/>
  <circle cx="100" cy="48" r="12" fill="#2c1810"/>
  <!-- Face reveal -->
  <ellipse cx="100" cy="95" rx="36" ry="42" fill="url(#skin7)"/>
  <!-- Eyes -->
  <ellipse cx="83" cy="95" rx="4.5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="117" cy="95" rx="4.5" ry="5.5" fill="#1a1a2e"/>
  <circle cx="84.5" cy="93.5" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="118.5" cy="93.5" r="1.5" fill="white" opacity="0.8"/>
  <!-- Eyelashes -->
  <path d="M75 90 Q83 86 91 90" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M109 90 Q117 86 125 90" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M97 101 Q100 109 103 101" stroke="#b8906a" stroke-width="1.5" fill="none"/>
  <!-- Mouth -->
  <path d="M89 115 Q100 122 111 115" stroke="#c05a50" stroke-width="2" fill="none" stroke-linecap="round"/>
