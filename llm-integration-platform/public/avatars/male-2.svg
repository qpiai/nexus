<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <linearGradient id="skin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c68642"/>
      <stop offset="100%" stop-color="#8d5524"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg2)"/>
  <!-- Shoulders -->
  <ellipse cx="100" cy="210" rx="70" ry="50" fill="#2d1b4e" opacity="0.9"/>
  <!-- Neck -->
  <rect x="85" y="130" width="30" height="25" rx="6" fill="url(#skin2)"/>
  <!-- Head -->
  <ellipse cx="100" cy="95" rx="38" ry="44" fill="url(#skin2)"/>
  <!-- Hair (curly/textured) -->
  <path d="M58 80 Q55 45 100 38 Q145 45 142 80 Q140 55 100 48 Q60 55 58 80Z" fill="#1a0f0a"/>
  <circle cx="65" cy="65" r="8" fill="#1a0f0a"/>
  <circle cx="80" cy="52" r="9" fill="#1a0f0a"/>
  <circle cx="100" cy="48" r="9" fill="#1a0f0a"/>
  <circle cx="120" cy="52" r="9" fill="#1a0f0a"/>
  <circle cx="135" cy="65" r="8" fill="#1a0f0a"/>
  <!-- Eyes -->
  <ellipse cx="82" cy="95" rx="5" ry="5.5" fill="#1a1a2e"/>
  <ellipse cx="118" cy="95" rx="5" ry="5.5" fill="#1a1a2e"/>
  <circle cx="83.5" cy="93.5" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="119.5" cy="93.5" r="1.5" fill="white" opacity="0.8"/>
  <!-- Eyebrows -->
  <path d="M73 84 Q82 80 92 84" stroke="#1a0f0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108 84 Q118 80 127 84" stroke="#1a0f0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M96 100 Q100 112 104 100" stroke="#7a4a2a" stroke-width="1.5" fill="none"/>
  <!-- Mouth / Smile -->
  <path d="M86 116 Q100 125 114 116" stroke="#8b4040" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Beard stubble hint -->
  <path d="M78 120 Q100 135 122 120" stroke="#1a0f0a" stroke-width="0.5" fill="none" opacity="0.3"/>
</svg>
