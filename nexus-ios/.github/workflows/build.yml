name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-nexuschat:
    name: Build NexusChat (MLX)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-nexuschat-${{ hashFiles('project.yml', 'Package.swift') }}
          restore-keys: spm-nexuschat-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build NexusChat
        run: |
          set -o pipefail
          xcodebuild build \
            -project Nexus.xcodeproj \
            -scheme NexusChat \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Release \
            -clonedSourcePackagesDirPath .spm-cache \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee build.log | tail -80
          echo "Build exit code: ${PIPESTATUS[0]}"

      - name: Package NexusChat.app
        if: success()
        run: |
          APP_PATH=$(find DerivedData -name "NexusChat.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/NexusChat-Simulator.zip" "NexusChat.app"
            echo "Packaged: $APP_PATH"
          else
            echo "Warning: NexusChat.app not found in DerivedData"
            find DerivedData -name "*.app" -type d || true
          fi

      - name: Upload NexusChat artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NexusChat-Simulator
          path: NexusChat-Simulator.zip
          if-no-files-found: warn

  build-nexus:
    name: Build Nexus (llama.cpp)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-nexus-${{ hashFiles('project.yml') }}
          restore-keys: spm-nexus-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Nexus
        run: |
          set -o pipefail
          xcodebuild build \
            -project Nexus.xcodeproj \
            -scheme Nexus \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Release \
            -clonedSourcePackagesDirPath .spm-cache \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee build.log | tail -80
          echo "Build exit code: ${PIPESTATUS[0]}"

      - name: Package Nexus.app
        if: success()
        run: |
          APP_PATH=$(find DerivedData -name "Nexus.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/Nexus-Simulator.zip" "Nexus.app"
            echo "Packaged: $APP_PATH"
          else
            echo "Warning: Nexus.app not found in DerivedData"
            find DerivedData -name "*.app" -type d || true
          fi

      - name: Upload Nexus artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Simulator
          path: Nexus-Simulator.zip
          if-no-files-found: warn
