name: nexus_mobile
description: Nexus LLM Deployment - Mobile companion app for hardware-aware model deployment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # Networking
  http: ^1.2.0
  # Device info
  device_info_plus: ^9.1.1
  battery_plus: ^5.0.2
  sensors_plus: ^3.1.0
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Charts
  fl_chart: ^0.66.0
  # Camera / Image
  image_picker: ^1.0.7
  # QR scanning
  mobile_scanner: ^5.1.1
  # Utils
  path_provider: ^2.1.2
  intl: ^0.19.0
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  # assets: []
